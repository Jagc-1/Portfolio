<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://kit.fontawesome.com/16d365cb18.js" crossorigin="anonymous"></script>
</head>

<body>
    <header class="header">
        <div class="menu container">
            <a href="#" class="logo">Logo</a>
            <input type="checkbox" id="check">
            <label for="check" class="mostrar-menu">
                <i class="fa-solid fa-bars"></i>
            </label>

            <nav class="navbar">
                <ul>
                    <li><a href="#home" class="active">Inicio</a></li>
                    <li><a href="#about">Sobre Mi</a></li>
                    <li><a href="#portfolio">Portfolio</a></li>
                    <li><a href="#contact">Contacto</a></li>
                </ul>
                <label for="check" class="esconder-menu">
                    <i class="fa-solid fa-x"></i>
                </label>
            </nav>
        </div>

        <div class="header-content container">
            <div class="header-text">
                <span>Soy</span>
                <h1>Full Stack Developer</h1>
                <a href="#about" class="btn-1">Información</a>
            </div>
        </div>
    </header>

    <section class="about container" id="about">
    <!-- Este contenido será generado dinámicamente por JavaScript -->
    </section>

    <section class="portfolio" id="portfolio">
        <h3>Portafolio</h3>
        <div class="container">
            <div class="portfolio-content" id="portfolioItems">
                <!-- Aquí se generará dinámicamente el contenido del portfolio -->
            </div>
        </div>
    </section>

    <section id="skills" class="skills container">
        <h2>Experiencia</h2>
        <div class="skills-content">
            <img src="./images/l1.png" alt="">
            <img src="./images/l2.png" alt="">
            <img src="./images/l3.png" alt="">
            <img src="./images/l4.png" alt="">
            <img src="./images/l5.png" alt="">
            <img src="./images/l7.png" alt="">

        </div>
    </section>

    <footer class="footer">
        <div class="footer-content container">
            <div class="link">
                <h3>Home Links</h3>
                <ul>
                    <li><a href="">Inicio</a></li>
                    <li><a href="">Sobre Mi</a></li>
                    <li><a href="">Portfolio</a></li>
                    <li><a href="">Contacto</a></li>
                </ul>
            </div>

            <div class="link">
                <h3>Information</h3>
                <ul>
                    <li><a href="">About Us</a></li>
                    <li><a href="">Delivery Information</a></li>
                    <li><a href="">Privacy policy</a></li>
                    <li><a href="">Terms & Conditions</a></li>
                </ul>
            </div>

            <div class="link">
                <h3>Contact Us</h3>
                <i class="fa-brands fa-facebook-f"></i>
                <i class="fa-brands fa-instagram"></i>
                <i class="fa-brands fa-twitter"></i>
                <i class="fa-brands fa-whatsapp"></i>
            </div>
        </div>
    </footer>


    <div id="modals"></div>

    <script src="./Js/script.js"></script>
</body>

</html>
